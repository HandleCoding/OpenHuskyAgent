name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to upload assets to
        required: true

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build and upload release artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build release artifacts
        run: ./mvnw -B -ntp -DskipTests package

      - name: Resolve release metadata
        id: artifacts
        run: |
          RELEASE_TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}"
          PROJECT_VERSION="$(./mvnw -q -DforceStdout help:evaluate -Dexpression=project.version)"
          SERVICE_JAR="service/target/husky-agent-service-${PROJECT_VERSION}.jar"
          CLIENT_JAR="client/target/husky-agent-client-${PROJECT_VERSION}.jar"
          test -f "$SERVICE_JAR"
          test -f "$CLIENT_JAR"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "release_version=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"
          echo "service_jar=$SERVICE_JAR" >> "$GITHUB_OUTPUT"
          echo "client_jar=$CLIENT_JAR" >> "$GITHUB_OUTPUT"

      - name: Prepare Homebrew bundle
        run: |
          rm -rf dist husky-macos-universal.tar.gz husky-macos-universal.tar.gz.sha256
          mkdir -p dist/husky-macos-universal/bin
          mkdir -p dist/husky-macos-universal/service/target
          mkdir -p dist/husky-macos-universal/client/target

          printf '%s\n' "${{ steps.artifacts.outputs.release_version }}" > dist/husky-macos-universal/VERSION
          cp bin/husky dist/husky-macos-universal/bin/
          cp .env.example dist/husky-macos-universal/
          cp LICENSE dist/husky-macos-universal/
          cp "${{ steps.artifacts.outputs.service_jar }}" dist/husky-macos-universal/service/target/
          cp "${{ steps.artifacts.outputs.client_jar }}" dist/husky-macos-universal/client/target/

          chmod +x dist/husky-macos-universal/bin/husky
          tar -czf husky-macos-universal.tar.gz -C dist husky-macos-universal
          sha256sum husky-macos-universal.tar.gz | tee husky-macos-universal.tar.gz.sha256

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.artifacts.outputs.release_tag }}
          files: |
            ${{ steps.artifacts.outputs.service_jar }}
            ${{ steps.artifacts.outputs.client_jar }}
            husky-macos-universal.tar.gz
            husky-macos-universal.tar.gz.sha256
